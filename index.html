// ─── AUTH ──────────────────────────────────────────────────────────────────
async function signUp(){
  const {authEmail:email,authPassword:pass,authName:name,authCode:code}=S;
  if(!email||!pass||!name){set({authError:"All fields are required."});return;}
  if(code.trim().toLowerCase()!==SIGNUP_CODE.toLowerCase()){set({authError:"Invalid signup code."});return;}
  set({authLoading:true,authError:""});
  const {data,error}=await db.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  if(error){set({authLoading:false,authError:error.message});return;}
  if(data.user) await db.from("profiles").upsert({id:data.user.id,email,full_name:name,role:"lawyer"},{onConflict:"id"});
  set({authLoading:false,authMode:"verify"});
}
async function signIn(){
  const {authEmail:email,authPassword:pass}=S;
  if(!email||!pass){set({authError:"Email and password required."});return;}
  set({authLoading:true,authError:""});
  const {error}=await db.auth.signInWithPassword({email,password:pass});
  if(error){set({authLoading:false,authError:error.message});return;}
  set({authLoading:false});
}
async function signOut(){
  await db.auth.signOut();
  set({session:null,profile:null,firms:[],currentFirm:null,events:[],view:"calendar"});
}

// ─── PROFILE ───────────────────────────────────────────────────────────────
async function saveName(){
  if(!S.newName.trim())return;
  await db.from("profiles").update({full_name:S.newName.trim()}).eq("id",S.session.user.id);
  S.profile.full_name=S.newName.trim();
  set({editingName:false,newName:""});
  showToast("Name updated!");
}
async function updateMyStatus(status){
  if(!S.currentFirmId)return;
  await db.from("firm_members").update({status,status_updated_at:new Date().toISOString()}).eq("firm_id",S.currentFirmId).eq("user_id",S.session.user.id);
  showToast(`Status set to ${STATUS_CONFIG[status]?.label}`);
}

// ─── FIRMS ─────────────────────────────────────────────────────────────────
async function loadFirms(){
  const {data}=await db.from("firm_members").select("firm_id, role, status, firms(*)").eq("user_id",S.session.user.id);
  if(!data||!data.length){set({firms:[]});return;}
  const firms=data.map(d=>({...d.firms,myRole:d.role,myStatus:d.status}));
  let currentFirmId=S.currentFirmId||firms[0]?.id;
  const currentFirm=firms.find(f=>f.id===currentFirmId)||firms[0];
  currentFirmId=currentFirm?.id||null;
  set({firms,currentFirmId,currentFirm});
  if(currentFirmId){await loadFirmMembers(currentFirmId);await loadEvents();}
}

async function switchFirm(firmId){
  const firm=S.firms.find(f=>f.id===firmId);
  set({currentFirmId:firmId,currentFirm:firm,events:[],firmDropOpen:false});
  await loadFirmMembers(firmId);
  await loadEvents();
}

async function loadFirmMembers(firmId){
  const {data}=await db.from("firm_members").select("*, profiles(full_name,email)").eq("firm_id",firmId);
  allFirmProfiles=data||[];
  render();
}

async function createFirm(){
  const {newFirmName:name,newFirmCode:code,newFirmLogo:logo,newFirmColor:nameColor,newFirmPrimary:primary}=S;
  if(!name||!code){showToast("Name and invite code are required.","error");return;}
  const {data:existing}=await db.from("firms").select("id").eq("invite_code",code).single();
  if(existing){showToast("That invite code is already taken. Choose another.","error");return;}
  const {data:firm,error}=await db.from("firms").insert({name,logo_url:logo,primary_color:primary,name_color:nameColor,invite_code:code,created_by:S.session.user.id}).select().single();
  if(error){showToast("Failed to create firm.","error");return;}
  await db.from("firm_members").insert({firm_id:firm.id,user_id:S.session.user.id,role:"admin"});
  set({showCreateFirm:false,newFirmName:"",newFirmCode:"",newFirmLogo:"",newFirmColor:"#1E293B",newFirmPrimary:"#4361EE"});
  await loadFirms();
  showToast(`${name} created! You are the admin.`);
}

async function joinFirm(){
  const code=S.joinCode.trim();
  if(!code){showToast("Enter an invite code.","error");return;}
  const {data:firm}=await db.from("firms").select("*").eq("invite_code",code).single();
  if(!firm){showToast("Invite code not found.","error");return;}
  const {data:existing}=await db.from("firm_members").select("id").eq("firm_id",firm.id).eq("user_id",S.session.user.id).single();
  if(existing){showToast("You're already a member of this firm.","error");return;}
  await db.from("firm_members").insert({firm_id:firm.id,user_id:S.session.user.id,role:"lawyer"});
  set({showJoinFirm:false,joinCode:""});
  await loadFirms();
  showToast(`Joined ${firm.name}!`);
}

async function removeMember(userId){
  if(!S.currentFirmId)return;
  await db.from("firm_members").delete().eq("firm_id",S.currentFirmId).eq("user_id",userId);
  await loadFirmMembers(S.currentFirmId);
  showToast("Member removed.");
}

async function updateMemberRole(userId,role){
  if(!S.currentFirmId)return;
  await db.from("firm_members").update({role}).eq("firm_id",S.currentFirmId).eq("user_id",userId);
  await loadFirmMembers(S.currentFirmId);
  showToast("Role updated.");
}

async function updateFirmSettings(){
  if(!S.currentFirmId)return;
  const f=S.currentFirm;
  await db.from("firms").update({name:f.name,logo_url:f.logo_url,primary_color:f.primary_color,bg_color:f.bg_color,name_color:f.name_color}).eq("id",S.currentFirmId);
  await loadFirms();
  showToast("Firm settings saved!");
}

// ─── EVENTS ────────────────────────────────────────────────────────────────
async function loadEvents(){
  if(!S.session)return;
  const userId=S.session.user.id;
  let query=db.from("events").select("*");
  if(S.currentFirmId){
    query=query.or(`firm_id.eq.${S.currentFirmId},and(calendar_type.eq.personal,created_by.eq.${userId})`);
  } else {
    query=query.eq("calendar_type","personal").eq("created_by",userId);
  }
  const {data}=await query.order("date",{ascending:true});
  set({events:data||[]});
}

async function addEvent(){
  const f=S.addForm;
  if(!f.clientName||!f.date){showToast("Client name and date required.","error");return;}
  const evt={
    id:uid(),client_name:f.clientName,client_file:f.clientFile,
    date:f.date,time:f.time,hearing_type:f.hearingType,
    jurisdiction:f.jurisdiction,courthouse:f.courthouse,
    courtroom:f.courtroom,judge:f.judge,attendees:f.attendees,
    notes:f.notes,created_by:S.session.user.id,
    calendar_type:f.calendarType,
    firm_id:f.calendarType==="firm"?S.currentFirmId:null
  };
  const {error}=await db.from("events").insert(evt);
  if(error){showToast("Failed to save: "+error.message,"error");return;}
  S.showAdd=false;
  S.addForm={clientName:"",clientFile:"",date:todayStr,time:"09:00",hearingType:"bail",jurisdiction:"",courthouse:"",courtroom:"",judge:"",attendees:"all",notes:"",calendarType:"firm"};
  showToast("Event added!");
}

async function deleteEvent(id){
  await db.from("events").delete().eq("id",id);
  set({selectedEvent:null});
  showToast("Event removed.");
}

function subscribeRealtime(){
  db.channel("realtime-all")
    .on("postgres_changes",{event:"*",schema:"public",table:"events"},()=>loadEvents())
    .on("postgres_changes",{event:"*",schema:"public",table:"firm_members"},()=>{if(S.currentFirmId)loadFirmMembers(S.currentFirmId);})
    .subscribe();
}

// ─── INIT ──────────────────────────────────────────────────────────────────
async function init(){
  const {data:{session}}=await db.auth.getSession();
  if(session){
    S.session=session;
    await loadProfile(session.user.id);
    await loadFirms();
    subscribeRealtime();
    // handle URL invite after login
    if(urlInviteCode&&!S.joinCode){set({showJoinFirm:true,joinCode:urlInviteCode});}
  }
  render();
  db.auth.onAuthStateChange(async(_,session)=>{
    S.session=session;
    if(session){
      await loadProfile(session.user.id);
      await loadFirms();
      subscribeRealtime();
      if(urlInviteCode){set({showJoinFirm:true,joinCode:urlInviteCode});}
    }
    render();
  });
}
async function loadProfile(userId){
  const {data}=await db.from("profiles").select("*").eq("id",userId).single();
  if(data)set({profile:data});
}

// ─── AUTH VIEW ─────────────────────────────────────────────────────────────
function authView(){
  const {authMode:mode,authEmail:e,authPassword:p,authName:n,authCode:c,authError:err,authLoading:loading}=S;
  if(mode==="verify")return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:${C.bg}"><div style="background:#fff;border-radius:20px;padding:44px;width:420px;border:1px solid ${C.border};text-align:center"><div style="font-size:20px;font-weight:800;margin-bottom:8px">Check your email</div><div style="font-size:14px;color:${C.muted};line-height:1.6">We sent a confirmation link to <strong>${e}</strong>. Click it then come back to sign in.</div><button onclick="set({authMode:'login',authError:''})" style="margin-top:24px;padding:10px 24px;background:${C.primary};color:#fff;border:none;border-radius:10px;font-weight:700">Back to Sign In</button></div></div>`;
  const field=(label,type,val,key,ph)=>`<div><div style="font-size:11px;font-weight:700;color:${C.muted};letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px">${label}</div><input type="${type}" value="${val}" oninput="S.${key}=this.value" placeholder="${ph}" style="width:100%;padding:10px 12px;border:1.5px solid ${C.border};border-radius:9px;background:${C.bg};color:${C.text};font-size:14px"></div>`;
  return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:${C.bg}">
    <div style="background:#fff;border-radius:20px;padding:44px;width:420px;border:1px solid ${C.border}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px">
        <div style="width:38px;height:38px;background:${C.primary};border-radius:11px;display:flex;align-items:center;justify-content:center">
          <svg width=18 height=18 viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
        </div>
        <div><div style="font-size:16px;font-weight:800;color:${C.text}">CourtLink</div><div style="font-size:10px;color:${C.muted};font-weight:700;letter-spacing:.5px">LEGAL CALENDAR</div></div>
      </div>
      <div style="font-size:21px;font-weight:800;margin-bottom:4px">${mode==="login"?"Welcome back":"Create your account"}</div>
      <div style="font-size:13px;color:${C.muted};margin-bottom:22px">${mode==="login"?"Sign in to continue":"You'll need the platform signup code from your admin"}</div>
      ${err?`<div style="padding:11px 14px;background:${C.redL};border:1px solid #FCA5A5;border-radius:9px;color:${C.red};font-size:13px;font-weight:600;margin-bottom:16px">${err}</div>`:""}
      <div style="display:flex;flex-direction:column;gap:12px">
        ${mode==="signup"?field("Full Name","text",n,"authName","Jane Smith"):""}
        ${field("Email","email",e,"authEmail","you@lawfirm.com")}
        ${field("Password","password",p,"authPassword","••••••••")}
        ${mode==="signup"?field("Signup Code","text",c,"authCode","Enter the platform code"):""}
      </div>
      <button onclick="${mode==="login"?"signIn()":"signUp()"}" ${loading?"disabled":""} style="width:100%;margin-top:20px;padding:12px;background:${C.primary};color:#fff;border:none;border-radius:10px;font-weight:800;font-size:14px">
        ${loading?"Please wait...":(mode==="login"?"Sign In →":"Create Account")}
      </button>
      <div style="text-align:center;margin-top:16px;font-size:13px;color:${C.muted}">
        ${mode==="login"?`No account? <button onclick="set({authMode:'signup',authError:''})" style="background:none;border:none;color:${C.primary};font-weight:700;font-size:13px">Sign up</button>`:`Have an account? <button onclick="set({authMode:'login',authError:''})" style="background:none;border:none;color:${C.primary};font-weight:700;font-size:13px">Sign in</button>`}
      </div>
    </div>
  </div>`;
}

function topbar(){

  const canEdit=["admin","lawyer"].includes(myRole);
  const vL={agenda:"Agenda",clients:"Clients",team:"Team",settings:"Settings"};
  return`<div style="padding:12px 20px;background:#fff;border-bottom:1px solid ${C.border};display:flex;align-items:center;gap:14px;flex-shrink:0">
    ${view==="calendar"?`<div style="display:flex;align-items:center;gap:8px">
      <button onclick="navMonth(-1)" style="width:29px;height:29px;border:1px solid ${C.border};border-radius:8px;background:transparent;display:flex;align-items:center;justify-content:center;color:${C.text}"><svg width=13 height=13 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg></button>
      <span style="font-size:15px;font-weight:800;min-width:166px;text-align:center">${MONTHS[mo]} ${yr}</span>
      <button onclick="navMonth(1)" style="width:29px;height:29px;border:1px solid ${C.border};border-radius:8px;background:transparent;display:flex;align-items:center;justify-content:center;color:${C.text}"><svg width=13 height=13 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg></button>
    </div>`:`<span style="font-size:15px;font-weight:800">${vL[view]||""}</span>`}
    <div style="flex:1"></div>
    ${canEdit?`<button onclick="set({showAdd:true})" style="display:flex;align-items:center;gap:6px;padding:8px 15px;background:${C.primary};color:#fff;border:none;border-radius:9px;font-weight:700;font-size:13px"><svg width=13 height=13 viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Event</button>`:""}
  </div>`;
}
function navMonth(d){let m=S.mo+d,y=S.yr;if(m<0){m=11;y--;}if(m>11){m=0;y++;}set({mo:m,yr:y});}
function evtFrom(r){return{id:r.id,clientName:r.client_name,clientFile:r.client_file,date:r.date,time:r.time,hearingType:r.hearing_type,jurisdiction:r.jurisdiction,courthouse:r.courthouse,courtroom:r.courtroom,judge:r.judge,attendees:r.attendees,notes:r.notes,calType:r.calendar_type};}

// ─── CALENDAR ──────────────────────────────────────────────────────────────
function calendarView(){
  const {events,yr,mo}=S;
  const total=getDays(yr,mo),first=getFirst(yr,mo);
  const cells=[];
  for(let i=0;i<first;i++)cells.push(null);
  for(let d=1;d<=total;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const evtsOn=d=>{const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;return events.filter(e=>e.date===ds).sort((a,b)=>a.time?.localeCompare(b.time));};
  return`<div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
      ${DAYS.map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:${C.muted};padding:5px 0;letter-spacing:.4px">${d}</div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
      ${cells.map(day=>{
        if(!day)return`<div style="min-height:105px"></div>`;
        const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        const isToday=ds===todayStr;
        const de=evtsOn(day);
        return`<div style="min-height:105px;background:#fff;border-radius:10px;padding:6px 5px;border:1.5px solid ${isToday?C.primary:C.border}">
          <div style="width:24px;height:24px;border-radius:50%;background:${isToday?C.primary:"transparent"};color:${isToday?"#fff":C.text};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:${isToday?800:600};margin-bottom:3px">${day}</div>
          ${de.slice(0,3).map(row=>{const e=evtFrom(row);const h=HEARING[e.hearingType]||HEARING.other;return`<div onclick="openEvt('${e.id}')" style="font-size:10px;border-radius:4px;padding:2px 5px;margin-bottom:2px;background:${e.calType==="personal"?"#F8FAFC":h.bg};color:${h.color};cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700;border-left:2px solid ${e.calType==="personal"?C.muted:h.color}">${e.calType==="personal"?"👤 ":""}${e.time} ${e.clientName}</div>`;}).join("")}
          ${de.length>3?`<div style="font-size:9px;color:${C.muted};padding-left:4px;font-weight:600">+${de.length-3} more</div>`:""}
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

// ─── AGENDA ────────────────────────────────────────────────────────────────
function agendaView(){
  const sorted=[...S.events].sort((a,b)=>a.date?.localeCompare(b.date)||a.time?.localeCompare(b.time));
  const up=sorted.filter(e=>e.date>=todayStr);
  const past=sorted.filter(e=>e.date<todayStr).reverse();
  const row=(r,dim)=>{
    const e=evtFrom(r);const h=HEARING[e.hearingType]||HEARING.other;
    const d=parseInt(e.date.split("-")[2]),m=parseInt(e.date.split("-")[1])-1;
    return`<div onclick="openEvt('${e.id}')" style="background:#fff;border-radius:12px;padding:14px 16px;border:1px solid ${C.border};display:flex;gap:14px;align-items:center;margin-bottom:7px;border-left:4px solid ${e.calType==="personal"?C.muted:h.color};opacity:${dim?.55:1};cursor:pointer">
      <div style="text-align:center;min-width:38px"><div style="font-size:22px;font-weight:800;line-height:1">${d}</div><div style="font-size:10px;color:${C.muted};font-weight:700;letter-spacing:.4px">${MONTHS[m].slice(0,3).toUpperCase()}</div></div>
      <div style="width:1px;background:${C.border};align-self:stretch"></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap">
          <span style="font-weight:800;font-size:14px">${e.clientName}</span>
          <span style="font-size:11px;padding:2px 9px;border-radius:99px;background:${h.bg};color:${h.color};font-weight:700">${h.label}</span>
          ${e.calType==="personal"?`<span style="font-size:10px;color:${C.muted};font-weight:600;background:${C.bg};padding:2px 7px;border-radius:99px;border:1px solid ${C.border}">Personal</span>`:""}
        </div>
        <div style="font-size:12px;color:${C.muted}">⏰ ${e.time} · 🏛 ${e.courthouse||"—"} Rm ${e.courtroom||"—"}</div>
        ${e.notes?`<div style="font-size:11px;color:${C.muted};margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📝 ${e.notes}</div>`:""}
      </div>
      <div style="font-size:11px;color:${C.muted};flex-shrink:0;font-weight:600">${e.clientFile||""}</div>
    </div>`;
  };
  return`<div>
    <div style="font-size:11px;font-weight:700;color:${C.muted};letter-spacing:.8px;margin-bottom:10px;text-transform:uppercase">Upcoming</div>
    ${up.length?up.map(e=>row(e,false)).join(""):`<div style="color:${C.muted};font-size:14px;padding:20px 0">No upcoming court dates.</div>`}
    ${past.length?`<div style="font-size:11px;font-weight:700;color:${C.muted};letter-spacing:.8px;margin:18px 0 10px;text-transform:uppercase">Past</div>${past.slice(0,5).map(e=>row(e,true)).join("")}`:""}
  </div>`;
}

// ─── CLIENTS ───────────────────────────────────────────────────────────────
function clientsView(){
  const names=[...new Set(S.events.map(e=>e.client_name))].filter(Boolean).sort();
  if(!names.length)return`<div style="color:${C.muted};font-size:14px">No clients yet.</div>`;
  return names.map(name=>{
    const ev=S.events.filter(e=>e.client_name===name).sort((a,b)=>a.date?.localeCompare(b.date));
    const up=ev.filter(e=>e.date>=todayStr);
    return`<div style="background:#fff;border-radius:12px;border:1px solid ${C.border};padding:16px 18px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div><div style="font-weight:800;font-size:15px">${name}</div><div style="font-size:12px;color:${C.muted};margin-top:2px">File ${ev[0]?.client_file||"N/A"} · ${ev.length} appearance${ev.length!==1?"s":""}</div></div>
        ${up.length?`<span style="padding:4px 12px;background:${C.primary}18;color:${C.primary};border-radius:99px;font-size:12px;font-weight:700">${up.length} upcoming</span>`:""}
      </div>

// ─── TEAM ──────────────────────────────────────────────────────────────────
function teamView(){
  if(!allFirmProfiles.length){loadFirmMembers(S.currentFirmId);return`<div style="color:${C.muted};font-size:14px">Loading team...</div>`;}
  const myRole=allFirmProfiles.find(m=>m.user_id===S.session?.user?.id)?.role||"other";
  const isAdmin=myRole==="admin";
  const byRole={admin:[],lawyer:[],student:[],other:[]};
  allFirmProfiles.forEach(m=>{const r=m.role||"other";(byRole[r]||byRole.other).push(m);});

  const memberCard=(m)=>{
    const sc=STATUS_CONFIG[m.status]||STATUS_CONFIG.offline;
    const name=m.profiles?.full_name||m.profiles?.email||"Unknown";
    const email=m.profiles?.email||"";
    const isMe=m.user_id===S.session?.user?.id;
    return`<div style="background:#fff;border-radius:12px;border:1px solid ${C.border};padding:14px 16px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:${isAdmin&&!isMe?10:0}px">

          <div style="font-weight:700;font-size:13px;display:flex;align-items:center;gap:5px">
            ${name}${isMe?`<span style="font-size:10px;color:${C.muted};background:${C.bg};padding:1px 6px;border-radius:99px;border:1px solid ${C.border}">You</span>`:""}
          </div>
          <div style="font-size:11px;color:${sc.color};font-weight:600;display:flex;align-items:center;gap:4px;margin-top:1px">

          <div style="font-size:10px;color:${C.muted};margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${email}</div>
        </div>
      </div>

        <select onchange="updateMemberRole('${m.user_id}',this.value)" style="flex:1;padding:5px 8px;border:1.5px solid ${C.border};border-radius:7px;background:${C.bg};color:${C.text};font-size:12px;font-weight:600">
          ${Object.entries(ROLE_LABELS).map(([k,v])=>`<option value="${k}" ${m.role===k?"selected":""}>${v}</option>`).join("")}
        </select>
        <button onclick="if(confirm('Remove this member?'))removeMember('${m.user_id}')" style="padding:5px 10px;border:1px solid #FCA5A5;border-radius:7px;background:${C.redL};color:${C.red};font-size:11px;font-weight:700">Remove</button>
      </div>`:`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:${isMe?6:0}px"><span style="font-size:11px;font-weight:700;color:${ROLE_COLORS[m.role]||C.muted};background:${ROLE_COLORS[m.role]||C.muted}18;padding:2px 9px;border-radius:99px">${ROLE_LABELS[m.role]||m.role}</span></div>`}
    </div>`;
  };

  const section=(title,members)=>members.length?`<div style="margin-bottom:22px">
    <div style="font-size:11px;font-weight:700;color:${C.muted};text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px">${title} (${members.length})</div>

  return`<div style="max-width:860px">

    </div>
    ${section("Admins",byRole.admin)}
    ${section("Lawyers",byRole.lawyer)}

}

function openEvt(id){set({selectedEvent:S.events.find(e=>e.id===id)||null});}

          <div style="font-size:11px;font-weight:700;color:${C.muted};margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px">Add to Calendar</div>
          <div style="display:flex;gap:6px">
            <button onclick="S.addForm.calendarType='firm';render()" style="flex:1;padding:9px;border:2px solid ${f.calendarType==="firm"?C.primary:C.border};border-radius:9px;background:${f.calendarType==="firm"?C.primary+"12":"#fff"};color:${f.calendarType==="firm"?C.primary:C.muted};font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px">
              <svg width=13 height=13 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              ${S.currentFirm?.name||"Firm"}
            </button>
            <button onclick="S.addForm.calendarType='personal';render()" style="flex:1;padding:9px;border:2px solid ${f.calendarType==="personal"?C.primary:C.border};border-radius:9px;background:${f.calendarType==="personal"?C.primary+"12":"#fff"};color:${f.calendarType==="personal"?C.primary:C.muted};font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px">
              <svg width=13 height=13 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="8" r="4"/><path d="M12 14c-5 0-8 2-8 3"/></svg>
              Personal
            </button>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px">
          <div style="grid-column:span 2">${inp("clientName","Client / Event Name *")}</div>
          ${inp("clientFile","File Number")}
          ${inp("date","Date *","date")}
          <div>
            <div style="font-size:11px;font-weight:700;color:${C.muted};margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">Time</div>
            <select onchange="S.addForm.time=this.value" style="width:100%;padding:8px 11px;border:1.5px solid ${C.border};border-radius:8px;background:${C.bg};color:${C.text};font-size:13px">
              ${TIME_OPTIONS.map(t=>`<option value="${t.val}" ${f.time===t.val?"selected":""}>${t.label}</option>`).join("")}
            </select>
          </div>
          ${inp("courthouse","Courthouse")}
          ${inp("courtroom","Courtroom #")}
          ${inp("jurisdiction","Jurisdiction")}
          ${inp("judge","Judge")}
        </div>
        <div style="margin-bottom:11px">
          <div style="font-size:11px;font-weight:700;color:${C.muted};margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">Hearing Type</div>
          <select onchange="S.addForm.hearingType=this.value" style="width:100%;padding:8px 11px;border:1.5px solid ${C.border};border-radius:8px;background:${C.bg};color:${C.text};font-size:13px">
            ${Object.entries(HEARING).map(([k,v])=>`<option value="${k}" ${f.hearingType===k?"selected":""}>${v.label}</option>`).join("")}
          </select>
        </div>
        ${f.calendarType==="firm"?`<div style="margin-bottom:11px">
          <div style="font-size:11px;font-weight:700;color:${C.muted};margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">Who Should Attend</div>
          <select onchange="S.addForm.attendees=this.value" style="width:100%;padding:8px 11px;border:1.5px solid ${C.border};border-radius:8px;background:${C.bg};color:${C.text};font-size:13px">
            <option value="all" ${f.attendees==="all"?"selected":""}>All Staff</option>
            <option value="lawyers" ${f.attendees==="lawyers"?"selected":""}>Lawyers Only</option>
            <option value="specific" ${f.attendees==="specific"?"selected":""}>Specific Person(s)</option>
          </select>
        </div>`:""}
        <div style="margin-bottom:20px">
          <div style="font-size:11px;font-weight:700;color:${C.muted};margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">Notes</div>
          <textarea oninput="S.addForm.notes=this.value" rows="2" style="width:100%;padding:8px 11px;border:1.5px solid ${C.border};border-radius:8px;background:${C.bg};color:${C.text};font-size:13px">${f.notes||""}</textarea>
        </div>
        <button onclick="addEvent()" style="width:100%;padding:11px;background:${C.primary};color:#fff;border:none;border-radius:10px;font-weight:800;font-size:14px">Add to Calendar</button>
      </div>
    </div>
  </div>`;
}

function toastEl(){
  if(!S.toast)return"";
  const isErr=S.toast.type==="error";
  return`<div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:999;display:flex;align-items:center;gap:8px;white-space:nowrap">
    ${isErr?`<svg width=14 height=14 viewBox="0 0 24 24" fill="none" stroke="${C.red}" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`:`<svg width=14 height=14 viewBox="0 0 24 24" fill="none" stroke="${C.green}" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>`}${S.toast.msg}</div>`;
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById("root");if(!root)return;
  if(!S.session){root.innerHTML=authView()+toastEl();return;}
  if(!S.firms.length&&!S.showCreateFirm&&!S.showJoinFirm){root.innerHTML=noFirmView()+toastEl();return;}
  if(S.showCreateFirm||S.showJoinFirm){root.innerHTML=noFirmView()+toastEl();return;}
  const views={calendar:calendarView,agenda:agendaView,clients:clientsView,team:teamView,settings:settingsView};
  root.innerHTML=`
    <div style="display:flex;height:100vh;background:${C.bg}" onclick="if(S.firmDropOpen){S.firmDropOpen=false;render()}">
      ${sidebar()}
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0">
        ${topbar()}
        <div style="flex:1;overflow:auto;padding:20px">${views[S.view]?.()}</div>
      </div>
    </div>
    ${eventModal()}${addModal()}${toastEl()}`;
}

init();
</script>
</body>
</html>
