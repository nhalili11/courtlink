// generate time options in 15-min increments 7:00am – 9:00pm
const TIME_OPTIONS = [];
for(let h=7;h<=21;h++){
  for(let m=0;m<60;m+=15){
    const hh=String(h).padStart(2,"0");
    const mm=String(m).padStart(2,"0");
    const val=`${hh}:${mm}`;
    const ampm=h<12?"AM":h===12?"PM":"PM";
    const h12=h===0?12:h>12?h-12:h;
    const label=`${h12}:${mm} ${ampm}`;
    TIME_OPTIONS.push({val,label});
  }
}

// ─── AUTH ──────────────────────────────────────────────────────────────────

async function signUp(){
  const {authEmail:email,authPassword:pass,authCode:code,authName:name}=S;
  if(!email||!pass||!code||!name){set({authError:"All fields are required."});return;}
  if(code.trim().toLowerCase()!==FIRM_CODE.trim().toLowerCase()){set({authError:"Invalid firm access code."});return;}
  set({authLoading:true,authError:""});
  const {data,error}=await db.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  if(error){set({authLoading:false,authError:error.message});return;}
  if(data.user){
    await db.from("profiles").upsert({id:data.user.id,email,full_name:name,role:"lawyer"},{onConflict:"id"});
  }
  set({authLoading:false,authError:"",authMode:"verify"});
}

async function signIn(){
  const {authEmail:email,authPassword:pass}=S;
  if(!email||!pass){set({authError:"Email and password required."});return;}
  set({authLoading:true,authError:""});
  const {data,error}=await db.auth.signInWithPassword({email,password:pass});
  if(error){set({authLoading:false,authError:error.message});return;}
  set({authLoading:false});
}

async function signOut(){
  await db.auth.signOut();
  set({session:null,profile:null,events:[],view:"calendar"});
}

// ─── DATA ──────────────────────────────────────────────────────────────────

async function loadEvents(){
  const {data,error}=await db.from("events").select("*").order("date",{ascending:true});
  if(!error)set({events:data||[]});
}

async function loadProfile(userId){
  const {data}=await db.from("profiles").select("*").eq("id",userId).single();
  if(data)set({profile:data});
}

async function loadAllProfiles(){
  const {data}=await db.from("profiles").select("*").order("full_name");
  allProfiles=data||[];render();
}

async function addEvent(){
  const f=S.addForm;
  if(!f.clientName||!f.date){showToast("Client name and date are required.","error");return;}
  const evt={
    id:uid(),client_name:f.clientName,client_file:f.clientFile,
    date:f.date,time:f.time,hearing_type:f.hearingType,
    jurisdiction:f.jurisdiction,courthouse:f.courthouse,
    courtroom:f.courtroom,judge:f.judge,attendees:f.attendees,
    notes:f.notes,created_by:S.session.user.id
  };
  const {error}=await db.from("events").insert(evt);
  if(error){showToast("Failed to save event.","error");return;}
  S.showAdd=false;
  S.addForm={clientName:"",clientFile:"",date:todayStr,time:"09:00",hearingType:"bail",jurisdiction:"",courthouse:"",courtroom:"",judge:"",attendees:"all",notes:""};
  showToast("Event added to calendar!");
}

async function deleteEvent(id){
  if(!["admin","lawyer"].includes(S.profile?.role)){showToast("You don't have permission.","error");return;}
  await db.from("events").delete().eq("id",id);
  set({selectedEvent:null});
  showToast("Event removed.");
}

async function updateRole(userId,role){
  await db.from("profiles").update({role}).eq("id",userId);
  showToast("Role updated.");
  loadAllProfiles();
}

function subscribeRealtime(){
  db.channel("events-changes")
    .on("postgres_changes",{event:"*",schema:"public",table:"events"},()=>loadEvents())
    .subscribe();
}

async function init(){
  const {data:{session}}=await db.auth.getSession();
  if(session){
    S.session=session;
    await loadProfile(session.user.id);
    await loadEvents();
    subscribeRealtime();
  }
  render();
  db.auth.onAuthStateChange(async(_,session)=>{
    S.session=session;
    if(session){
      await loadProfile(session.user.id);
      await loadEvents();
      subscribeRealtime();
    }
    render();
  });
}

function navMonth(d){let m=S.mo+d,y=S.yr;if(m<0){m=11;y--;}if(m>11){m=0;y++;}set({mo:m,yr:y});}
function evtFromRow(r){return{id:r.id,clientName:r.client_name,clientFile:r.client_file,date:r.date,time:r.time,hearingType:r.hearing_type,jurisdiction:r.jurisdiction,courthouse:r.courthouse,courtroom:r.courtroom,judge:r.judge,attendees:r.attendees,notes:r.notes};}

// ─── CALENDAR VIEW ─────────────────────────────────────────────────────────

function calendarView(){
  const {events,yr,mo}=S;
  const total=getDays(yr,mo),first=getFirst(yr,mo);
  const cells=[];
  for(let i=0;i<first;i++)cells.push(null);
  for(let d=1;d<=total;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const evtsOn=d=>{
    const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    return events.filter(e=>e.date===ds).sort((a,b)=>a.time?.localeCompare(b.time));
  };
  return`<div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
      ${DAYS.map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:${C.muted};padding:5px 0;letter-spacing:.4px">${d}</div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
      ${cells.map(day=>{
        if(!day)return`<div style="min-height:105px"></div>`;
        const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        const isToday=ds===todayStr;
        const de=evtsOn(day);
        return`<div style="min-height:105px;background:#fff;border-radius:10px;padding:6px 5px;border:1.5px solid ${isToday?C.primary:C.border}">
          <div style="width:24px;height:24px;border-radius:50%;background:${isToday?C.primary:"transparent"};color:${isToday?"#fff":C.text};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:${isToday?800:600};margin-bottom:3px">${day}</div>
          ${de.slice(0,3).map(row=>{const e=evtFromRow(row);const h=HEARING[e.hearingType]||HEARING.other;return`<div onclick="openEvt('${e.id}')" style="font-size:10px;border-radius:4px;padding:2px 5px;margin-bottom:2px;background:${h.bg};color:${h.color};cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700;border-left:2px solid ${h.color}">${e.time} ${e.clientName}</div>`;}).join("")}
          ${de.length>3?`<div style="font-size:9px;color:${C.muted};padding-left:4px;font-weight:600">+${de.length-3} more</div>`:""}
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

// ─── AGENDA VIEW ───────────────────────────────────────────────────────────

function agendaView(){
  const sorted=[...S.events].sort((a,b)=>a.date?.localeCompare(b.date)||a.time?.localeCompare(b.time));
  const up=sorted.filter(e=>e.date>=todayStr);
  const past=sorted.filter(e=>e.date<todayStr).reverse();
  const row=(r,dim)=>{
    const e=evtFromRow(r);
    const h=HEARING[e.hearingType]||HEARING.other;
    const d=parseInt(e.date.split("-")[2]),m=parseInt(e.date.split("-")[1])-1;
    return`<div onclick="openEvt('${e.id}')" style="background:#fff;border-radius:12px;padding:14px 16px;border:1px solid ${C.border};display:flex;gap:14px;align-items:center;margin-bottom:7px;border-left:4px solid ${h.color};opacity:${dim?.55:1};cursor:pointer">
      <div style="text-align:center;min-width:38px">
        <div style="font-size:22px;font-weight:800;color:${C.text};line-height:1">${d}</div>
        <div style="font-size:10px;color:${C.muted};font-weight:700;letter-spacing:.4px">${MONTHS[m].slice(0,3).toUpperCase()}</div>
      </div>
      <div style="width:1px;background:${C.border};align-self:stretch"></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap">
          <span style="font-weight:800;font-size:14px">${e.clientName}</span>
          <span style="font-size:11px;padding:2px 9px;border-radius:99px;background:${h.bg};color:${h.color};font-weight:700">${h.label}</span>
        </div>
        <div style="font-size:12px;color:${C.muted};font-weight:500">⏰ ${e.time} · 🏛 ${e.courthouse||"—"} Rm ${e.courtroom||"—"} · 📍 ${e.jurisdiction||"—"}</div>
        ${e.notes?`<div style="font-size:11px;color:${C.muted};margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📝 ${e.notes}</div>`:""}
      </div>
      <div style="font-size:11px;color:${C.muted};text-align:right;flex-shrink:0;font-weight:600">${e.clientFile||""}</div>
    </div>`;
  };
  return`<div>
    <div style="font-size:11px;font-weight:700;color:${C.muted};letter-spacing:.8px;margin-bottom:10px;text-transform:uppercase">Upcoming</div>
    ${up.length?up.map(e=>row(e,false)).join(""):`<div style="color:${C.muted};font-size:14px;padding:20px 0">No upcoming court dates.</div>`}
    ${past.length?`<div style="font-size:11px;font-weight:700;color:${C.muted};letter-spacing:.8px;margin:18px 0 10px;text-transform:uppercase">Past</div>${past.slice(0,5).map(e=>row(e,true)).join("")}`:""}
  </div>`;
}

        <div style="font-size:19px;font-weight:800;color:${C.text}">${e.clientName}</div>
        <div style="font-size:12px;color:${C.muted};margin-top:2px">File ${e.clientFile||"N/A"}</div>
        <button onclick="set({selectedEvent:null})" style="position:absolute;top:16px;right:14px;background:#fff;border:1px solid ${C.border};border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:${C.muted};font-size:16px">✕</button>
      </div>
      <div style="padding:20px 22px">
        ${fields.map(([l,v])=>`<div style="margin-bottom:13px"><div style="font-size:10px;font-weight:700;color:${C.muted};letter-spacing:.7px;margin-bottom:3px;text-transform:uppercase">${l}</div><div style="font-size:14px;font-weight:600;color:${C.text}">${v||"—"}</div></div>`).join("")}
        ${e.notes?`<div style="margin-bottom:14px"><div style="font-size:10px;font-weight:700;color:${C.muted};letter-spacing:.7px;margin-bottom:4px;text-transform:uppercase">Notes</div><div style="font-size:13px;color:${C.text};padding:11px;background:${C.bg};border-radius:9px;line-height:1.6">${e.notes}</div></div>`:""}
        ${canDelete?`<button onclick="deleteEvent('${e.id}')" style="padding:7px 14px;background:${C.redL};color:${C.red};border:1px solid #FCA5A5;border-radius:8px;font-size:12px;font-weight:700">Remove Event</button>`:""}
      </div>
    </div>
  </div>`;
}

function timeSelect(currentVal){
  return`<select onchange="S.addForm.time=this.value" style="width:100%;padding:8px 11px;border:1.5px solid ${C.border};border-radius:8px;background:${C.bg};color:${C.text};font-weight:500;font-size:13px">
    ${TIME_OPTIONS.map(t=>`<option value="${t.val}" ${currentVal===t.val?"selected":""}>${t.label}</option>`).join("")}
  </select>`;
}

function addModal(){
  if(!S.showAdd)return"";
  const f=S.addForm;
  const inp=(key,lbl,type="text")=>`<div>
    <div style="font-size:11px;font-weight:700;color:${C.muted};margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">${lbl}</div>
    <input type="${type}" value="${f[key]||""}" oninput="S.addForm['${key}']=this.value" style="width:100%;padding:8px 11px;border:1.5px solid ${C.border};border-radius:8px;background:${C.bg};color:${C.text};font-size:13px">
  </div>`;
  return`<div onclick="set({showAdd:false})" style="position:fixed;inset:0;background:rgba(15,23,42,.4);display:flex;align-items:center;justify-content:center;z-index:200">
    <div onclick="event.stopPropagation()" style="background:#fff;border-radius:16px;width:500px;max-width:94vw;max-height:92vh;overflow:auto;box-shadow:0 24px 56px rgba(0,0,0,.18)">
      <div style="padding:18px 22px;border-bottom:1px solid ${C.border};display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:800;font-size:16px">Add Court Event</div>
        <button onclick="set({showAdd:false})" style="background:${C.bg};border:1px solid ${C.border};border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:${C.muted};font-size:16px">✕</button>
      </div>
      <div style="padding:22px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px">
          <div style="grid-column:span 2">${inp("clientName","Client Name *")}</div>
          ${inp("clientFile","File Number")}
          ${inp("date","Date *","date")}
          <div>
            <div style="font-size:11px;font-weight:700;color:${C.muted};margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">Time</div>
            ${timeSelect(f.time)}
          </div>
          ${inp("courthouse","Courthouse")}
          ${inp("courtroom","Courtroom #")}
          ${inp("jurisdiction","Jurisdiction")}
          ${inp("judge","Judge")}
        </div>
        <div style="margin-bottom:11px">
          <div style="font-size:11px;font-weight:700;color:${C.muted};margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">Hearing Type</div>
          <select onchange="S.addForm.hearingType=this.value" style="width:100%;padding:8px 11px;border:1.5px solid ${C.border};border-radius:8px;background:${C.bg};color:${C.text};font-size:13px">
            ${Object.entries(HEARING).map(([k,v])=>`<option value="${k}" ${f.hearingType===k?"selected":""}>${v.label}</option>`).join("")}
          </select>
        </div>
        <div style="margin-bottom:11px">
          <div style="font-size:11px;font-weight:700;color:${C.muted};margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">Who Should Attend</div>
          <select onchange="S.addForm.attendees=this.value" style="width:100%;padding:8px 11px;border:1.5px solid ${C.border};border-radius:8px;background:${C.bg};color:${C.text};font-size:13px">
            <option value="all" ${f.attendees==="all"?"selected":""}>All Staff</option>
            <option value="lawyers" ${f.attendees==="lawyers"?"selected":""}>Lawyers Only</option>
            <option value="specific" ${f.attendees==="specific"?"selected":""}>Specific Person(s)</option>
          </select>
        </div>
        <div style="margin-bottom:20px">
          <div style="font-size:11px;font-weight:700;color:${C.muted};margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px">Notes</div>
          <textarea oninput="S.addForm.notes=this.value" rows="2" style="width:100%;padding:8px 11px;border:1.5px solid ${C.border};border-radius:8px;background:${C.bg};color:${C.text};font-size:13px">${f.notes||""}</textarea>
        </div>
        <button onclick="addEvent()" style="width:100%;padding:11px;background:${C.primary};color:#fff;border:none;border-radius:10px;font-weight:800;font-size:14px">Add to Calendar</button>
      </div>
    </div>
  </div>`;
}

function toastEl(){
  if(!S.toast)return"";
  const isErr=S.toast.type==="error";
  return`<div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:999;display:flex;align-items:center;gap:8px;white-space:nowrap">
    ${isErr?`<svg width=14 height=14 viewBox="0 0 24 24" fill="none" stroke="${C.red}" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`:`<svg width=14 height=14 viewBox="0 0 24 24" fill="none" stroke="${C.green}" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>`}
    ${S.toast.msg}
  </div>`;
}

// ─── RENDER ────────────────────────────────────────────────────────────────

function render(){
  const root=document.getElementById("root");
  if(!root)return;
  if(!S.session){
    root.innerHTML=`<div style="min-height:100vh">${authView()}</div>${toastEl()}`;
    return;
  }
  const views={calendar:calendarView,agenda:agendaView,clients:clientsView,team:teamView,settings:settingsView};
  root.innerHTML=`
    <div style="display:flex;height:100vh;background:${C.bg}">
      ${sidebar()}
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0">
        ${topbar()}
        <div style="flex:1;overflow:auto;padding:20px">${views[S.view]?.()}</div>
      </div>
    </div>
    ${eventModal()}
    ${addModal()}
    ${toastEl()}`;
}

init();
</script>
</body>
</html>
